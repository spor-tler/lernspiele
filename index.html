<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lernspiele</title>
  <meta name="description" content="Sammlung interaktiver Lernspiele — gefiltert nach Thema und Schulstufe.">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <span class="deco deco-die" aria-hidden="true">
      <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="48" height="48" rx="12" fill="#8A9A6B"/><circle cx="18" cy="18" r="4.5" fill="#EEE9DD"/><circle cx="30" cy="30" r="4.5" fill="#EEE9DD"/><circle cx="42" cy="42" r="4.5" fill="#EEE9DD"/></svg>
    </span>
    <span class="deco deco-pawn" aria-hidden="true">
      <svg viewBox="0 0 40 58" fill="#C99A3A" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="10" r="8"/><path d="M14 18 h12 l-2 5 h-8 z"/><path d="M13 23 C13 34 9 40 8 48 h24 c-1-8-5-14-5-25 z"/><rect x="6" y="47" width="28" height="7" rx="3.5"/></svg>
    </span>
    <span class="deco deco-spark deco-spark-1" aria-hidden="true">
      <svg viewBox="0 0 40 40" fill="#C99A3A" xmlns="http://www.w3.org/2000/svg"><path d="M20 0 C22 13 27 18 40 20 C27 22 22 27 20 40 C18 27 13 22 0 20 C13 18 18 13 20 0 Z"/></svg>
    </span>
    <span class="deco deco-spark deco-spark-2" aria-hidden="true">
      <svg viewBox="0 0 40 40" fill="#C99A3A" xmlns="http://www.w3.org/2000/svg"><path d="M20 0 C22 13 27 18 40 20 C27 22 22 27 20 40 C18 27 13 22 0 20 C13 18 18 13 20 0 Z"/></svg>
    </span>
    <div class="header-inner">
      <span class="hero-emblem" aria-hidden="true">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lernspiele Emblem"><circle cx="60" cy="60" r="56" fill="#233028" stroke="#C99A3A" stroke-width="4"/><circle cx="60" cy="60" r="46" fill="none" stroke="#C99A3A" stroke-width="2" stroke-dasharray="3 8" opacity="0.5"/><g transform="rotate(-8 60 60)"><rect x="39" y="39" width="42" height="42" rx="10" fill="#EEE9DD"/><circle cx="50" cy="50" r="3.6" fill="#233028"/><circle cx="70" cy="50" r="3.6" fill="#233028"/><circle cx="60" cy="60" r="3.6" fill="#C99A3A"/><circle cx="50" cy="70" r="3.6" fill="#233028"/><circle cx="70" cy="70" r="3.6" fill="#233028"/></g></svg>
      </span>
      <p class="kicker">Spielerisch lernen</p>
      <h1>Lernspiele</h1>
      <p class="lead">Interaktive Übungen für die Klasse und für daheim — wähle Thema oder Schulstufe.</p>
    </div>
    <span class="board-track" aria-hidden="true"></span>
  </header>

  <section class="controls">
    <div class="search-wrap">
      <input id="search" type="search" placeholder="🔍  Spiel suchen (Titel, Thema, Fach)…" autocomplete="off">
    </div>
    <div class="filter-group">
      <h3>Thema</h3>
      <div class="chips" id="filter-thema">
        <button class="chip active" data-group="thema" data-value="">Alle</button>
        <button class="chip" data-group="thema" data-value="Aktiv / Passiv">Aktiv / Passiv</button>
        <button class="chip" data-group="thema" data-value="Conditionals (If-Sätze)">Conditionals (If-Sätze)</button>
        <button class="chip" data-group="thema" data-value="Irregular Verbs">Irregular Verbs</button>
        <button class="chip" data-group="thema" data-value="Past Simple">Past Simple</button>
        <button class="chip" data-group="thema" data-value="Past Tense">Past Tense</button>
        <button class="chip" data-group="thema" data-value="Past Tense (Irregular)">Past Tense (Irregular)</button>
        <button class="chip" data-group="thema" data-value="Past vs Present Perfect">Past vs Present Perfect</button>
        <button class="chip" data-group="thema" data-value="Possessives &amp; Fragen mit who">Possessives &amp; Fragen mit who</button>
        <button class="chip" data-group="thema" data-value="Present Perfect">Present Perfect</button>
        <button class="chip" data-group="thema" data-value="Present Perfect Progressive">Present Perfect Progressive</button>
        <button class="chip" data-group="thema" data-value="Present Perfect vs Past Simple">Present Perfect vs Past Simple</button>
        <button class="chip" data-group="thema" data-value="Regular &amp; Irregular Verbs">Regular &amp; Irregular Verbs</button>
        <button class="chip" data-group="thema" data-value="Some / Any">Some / Any</button>
      </div>
    </div>
    <div class="filter-group">
      <h3>Schulstufe</h3>
      <div class="chips" id="filter-stufe">
        <button class="chip active" data-group="stufe" data-value="">Alle</button>
        <button class="chip" data-group="stufe" data-value="5. Schulstufe">5. Schulstufe</button>
        <button class="chip" data-group="stufe" data-value="6. Schulstufe">6. Schulstufe</button>
        <button class="chip" data-group="stufe" data-value="7. Schulstufe">7. Schulstufe</button>
        <button class="chip" data-group="stufe" data-value="8. Schulstufe">8. Schulstufe</button>
      </div>
    </div>
  </section>

  <p class="count" id="count"></p>
  <main class="grid" id="grid"></main>
  <p class="empty" id="empty" hidden>Keine Spiele gefunden. Filter zurücksetzen?</p>

  <footer class="site-footer">
    Erstellt mit ♥ · neue Spiele: Datei in <code>spiele/</code> legen &amp; <code>node build.js</code> ausführen.
  </footer>

  <script>
    const SPIELE = [{"datei":"spiele/active-passive-hero.html","titel":"Active/Passive Super Hero","thema":"Aktiv / Passiv","stufe":"7. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Verwandle Sätze zwischen Aktiv und Passiv und rette den Tag."},{"datei":"spiele/austria-free-kick-passive.html","titel":"Austria Free Kick: Passive","thema":"Aktiv / Passiv","stufe":"7. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Schieß den Freistoß und beherrsche den Wechsel zwischen Aktiv und Passiv."},{"datei":"spiele/city-surfer-conditionals.html","titel":"City Surfer: Conditionals","thema":"Conditionals (If-Sätze)","stufe":"8. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Surf durch die Stadt und vervollständige die richtigen If-Sätze."},{"datei":"spiele/city-surfer-irregular-verbs.html","titel":"City Surfer: Irregular Verbs","thema":"Irregular Verbs","stufe":"6. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Surf durch die Stadt und meistere die unregelmäßigen Verben."},{"datei":"spiele/conditional-hero.html","titel":"Conditional Hero","thema":"Conditionals (If-Sätze)","stufe":"8. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Meistere die If-Sätze (Type 1–3) als Conditional Hero."},{"datei":"spiele/elfmeter-possessives.html","titel":"Elfmeter-Quiz: Possessives & Who","thema":"Possessives & Fragen mit who","stufe":"5. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Triff ins Tor, indem du Possessivbegleiter und who-Fragen richtig löst."},{"datei":"spiele/flappy-grammar.html","titel":"Flappy Grammar","thema":"Past vs Present Perfect","stufe":"7. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Flieg durch die Lücken mit der richtigen Zeitform: Past oder Present Perfect."},{"datei":"spiele/freikick-hero-ppp.html","titel":"Free Kick Hero: Present Perfect Progressive","thema":"Present Perfect Progressive","stufe":"7. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Trainiere have/has been + -ing beim Freistoß."},{"datei":"spiele/freikick-hero.html","titel":"Free Kick Hero","thema":"Present Perfect Progressive","stufe":"7. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Freistoß-Variante zum Present Perfect Progressive."},{"datei":"spiele/moorhuhn-past-tense.html","titel":"Moorhuhn Blaster: Past Tense","thema":"Past Tense (Irregular)","stufe":"6. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Schieße die Moorhühner mit der richtigen unregelmäßigen Vergangenheitsform ab."},{"datei":"spiele/past-simple-snake.html","titel":"Past Simple Snake","thema":"Past Simple","stufe":"6. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Steuere die Schlange zur richtigen Vergangenheitsform der Verben."},{"datei":"spiele/present-perfect-hero.html","titel":"Present Perfect Hero","thema":"Present Perfect","stufe":"7. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Werde zum Helden des Present Perfect — have/has + Partizip."},{"datei":"spiele/present-perfect-vs-past-hero.html","titel":"Present Perfect vs Past Hero","thema":"Present Perfect vs Past Simple","stufe":"7. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Entscheide blitzschnell zwischen Present Perfect und Past Simple."},{"datei":"spiele/some-any-baseball.html","titel":"Some/Any Baseball","thema":"Some / Any","stufe":"5. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Schlage den Ball mit der richtigen Wahl zwischen some und any."},{"datei":"spiele/tennis-past-tense.html","titel":"Tennis Past Tense","thema":"Past Tense","stufe":"6. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Returniere den Ball mit der richtigen Vergangenheitsform."},{"datei":"spiele/verb-dash.html","titel":"Verb Dash","thema":"Regular & Irregular Verbs","stufe":"6. Schulstufe","fach":"Englisch (Grammatik)","beschreibung":"Renn los und unterscheide regelmäßige von unregelmäßigen Verben."}];
    const state = { thema: "", stufe: "", q: "" };
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const count = document.getElementById("count");

    function card(s) {
      const badges = [];
      if (s.thema) badges.push('<span class="badge thema">' + esc(s.thema) + '</span>');
      if (s.stufe) badges.push('<span class="badge stufe">' + esc(s.stufe) + '</span>');
      if (s.fach)  badges.push('<span class="badge fach">' + esc(s.fach) + '</span>');
      return '<a class="card" href="' + esc(s.datei) + '" target="_blank" rel="noopener">' +
        '<div class="badges">' + badges.join("") + '</div>' +
        '<h2>' + esc(s.titel) + '</h2>' +
        (s.beschreibung ? '<p>' + esc(s.beschreibung) + '</p>' : '') +
        '<span class="play">Spielen →</span></a>';
    }
    function esc(t) {
      return String(t).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }
    function render() {
      const q = state.q.toLowerCase();
      const list = SPIELE.filter(s =>
        (!state.thema || s.thema === state.thema) &&
        (!state.stufe || s.stufe === state.stufe) &&
        (!q || (s.titel + " " + s.thema + " " + s.fach + " " + s.beschreibung).toLowerCase().includes(q))
      );
      grid.innerHTML = list.map(card).join("");
      empty.hidden = list.length > 0;
      count.textContent = list.length + (list.length === 1 ? " Spiel" : " Spiele");
    }
    document.querySelectorAll(".chip").forEach(btn => {
      btn.addEventListener("click", () => {
        const g = btn.dataset.group;
        state[g] = btn.dataset.value;
        document.querySelectorAll('.chip[data-group="' + g + '"]').forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      });
    });
    document.getElementById("search").addEventListener("input", e => {
      state.q = e.target.value; render();
    });
    render();
  </script>
</body>
</html>
